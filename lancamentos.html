<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão Financeira - Lançamentos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="appRoot">
      <aside class="sidebar" aria-label="Menu lateral">
        <div class="sidebar__top">
          <div class="brand">
            <button
              class="brand__icon brand__icon--btn"
              id="btnBrand"
              type="button"
              aria-label="Alternar menu"
            >
              <i class="bi bi-wallet2" aria-hidden="true"></i>
            </button>
            <div class="brand__text">
              <div class="brand__title">Gestão Financeira</div>
              <div class="brand__subtitle">Saldo: <span id="saldoHeader">R$ 0,00</span></div>
            </div>
            <button class="iconBtn iconBtn--ghost" id="btnSidebar" aria-label="Alternar menu">
              <i class="bi bi-list"></i>
            </button>
          </div>

          <nav class="nav" aria-label="Navegação">
            <a class="nav__item" href="index.html">
              <span class="nav__icon"><i class="bi bi-graph-up-arrow"></i></span>
              <span class="nav__label">Fluxo de Caixa</span>
            </a>
            <a class="nav__item nav__item--active" href="lancamentos.html">
              <span class="nav__icon"><i class="bi bi-currency-dollar"></i></span>
              <span class="nav__label">Lançamentos</span>
            </a>
            <a class="nav__item" href="contas.html">
              <span class="nav__icon"><i class="bi bi-credit-card"></i></span>
              <span class="nav__label">Contas</span>
            </a>
            <a class="nav__item" href="pendencias.html">
              <span class="nav__icon"><i class="bi bi-clipboard-check"></i></span>
              <span class="nav__label">Pendências</span>
            </a>
            <a class="nav__item" href="calendario.html">
              <span class="nav__icon"><i class="bi bi-calendar3"></i></span>
              <span class="nav__label">Calendário</span>
            </a>
            <a class="nav__item" href="recorrencias.html">
              <span class="nav__icon"><i class="bi bi-arrow-repeat"></i></span>
              <span class="nav__label">Recorrências</span>
            </a>
          </nav>
        </div>

        <div class="sidebar__bottom">
          <div class="totalCard">
            <div class="totalCard__label">Saldo total</div>
            <div class="totalCard__value" id="saldoTotal">R$ 0,00</div>
          </div>
        </div>
      </aside>

      <main class="main" aria-label="Conteúdo principal">
        <header class="topbar">
          <div>
            <h1 class="topbar__title">Lançamentos</h1>
            <p class="topbar__subtitle">Cadastre receitas e despesas com facilidade</p>
          </div>

          <div class="topbar__actions">
            <button class="btn btn--soft" id="btnAuth" type="button">
              <i class="bi bi-person-check"></i>
              <span id="btnAuthLabel">Entrar</span>
            </button>

            <button class="btn btn--primary" id="btnExport" type="button">
              <i class="bi bi-download"></i>
              <span>Exportar Dados</span>
            </button>
          </div>
        </header>

        <section class="grid">
          <section class="card formCard" data-anim>
            <div class="card__header">
              <h2 class="card__title">Novo Lançamento</h2>
            </div>

            <form class="form" id="formLancamento">
              <div class="form__row form__row--2">
                <div class="field">
                  <div class="field__labelRow">
                    <label class="field__label" for="tipo">Tipo</label>
                    <span class="field__labelSpacer" aria-hidden="true"></span>
                  </div>
                  <div class="field__control">
                    <select class="input" id="tipo" name="tipo" required>
                      <option value="Receita">Receita</option>
                      <option value="Despesa">Despesa</option>
                    </select>
                    <span class="field__icon" aria-hidden="true"><i class="bi bi-chevron-down"></i></span>
                  </div>
                </div>

                <div class="field">
                  <div class="field__labelRow">
                    <label class="field__label" for="categoria">Categoria</label>
                    <button class="miniBtn" id="btnAddCategoria" type="button" aria-label="Adicionar categoria">
                      <i class="bi bi-plus-lg" aria-hidden="true"></i>
                      <span>Adicionar</span>
                    </button>
                  </div>
                  <div class="field__control">
                    <select class="input" id="categoria" name="categoria" required>
                      <option value="" selected disabled>Selecione uma categoria</option>
                    </select>
                    <span class="field__icon" aria-hidden="true"><i class="bi bi-chevron-down"></i></span>
                  </div>
                </div>
              </div>

              <div class="field">
                <label class="field__label" for="descricao">Descrição</label>
                <textarea
                  class="input input--textarea"
                  id="descricao"
                  name="descricao"
                  placeholder="Descrição do lançamento"
                  rows="2"
                  required
                ></textarea>
              </div>

              <div class="form__row form__row--2">
                <div class="field">
                  <label class="field__label" for="valor">Valor</label>
                  <input class="input" id="valor" name="valor" inputmode="decimal" placeholder="0,00" required />
                </div>

                <div class="field">
                  <label class="field__label" for="data">Data</label>
                  <div class="field__control">
                    <input class="input" id="data" name="data" type="date" required />
                    <span class="field__icon" aria-hidden="true"><i class="bi bi-calendar3"></i></span>
                  </div>
                </div>
              </div>

              <div class="field">
                <label class="field__label" for="conta">Conta</label>
                <div class="field__control">
                  <select class="input" id="conta" name="conta" required>
                    <option value="" selected disabled>Selecione uma conta</option>
                    <option value="Carteira">Carteira</option>
                    <option value="Banco">Banco</option>
                    <option value="Cartão">Cartão</option>
                  </select>
                  <span class="field__icon" aria-hidden="true"><i class="bi bi-chevron-down"></i></span>
                </div>
              </div>

              <label class="check">
                <input type="checkbox" id="recorrente" name="recorrente" />
                <span class="check__box" aria-hidden="true"></span>
                <span class="check__label">Lançamento recorrente</span>
              </label>

              <div class="form__row form__row--2" id="recorrenciaFields" hidden>
                <div class="field">
                  <label class="field__label" for="recInterval">Intervalo (meses)</label>
                  <input class="input" id="recInterval" name="recInterval" type="number" min="1" step="1" value="1" />
                </div>

                <div class="field">
                  <label class="field__label" for="recMonthsAhead">Gerar próximos (meses)</label>
                  <input
                    class="input"
                    id="recMonthsAhead"
                    name="recMonthsAhead"
                    type="number"
                    min="1"
                    max="120"
                    step="1"
                    value="12"
                  />
                </div>
              </div>

              <div class="field" id="recEndWrap" hidden>
                <label class="field__label" for="recEndDate">Encerrar em (opcional)</label>
                <div class="field__control">
                  <input class="input" id="recEndDate" name="recEndDate" type="date" />
                  <span class="field__icon" aria-hidden="true"><i class="bi bi-calendar3"></i></span>
                </div>
              </div>

              <button class="btn btn--cta" type="submit" id="btnAdicionar">
                Adicionar Lançamento
              </button>
            </form>
          </section>

          <section class="recent" data-anim>
            <div class="recent__head">
              <h2 class="recent__title">Lançamentos Recentes</h2>

              <div class="recent__tools">
                <div class="field__control recentSearch">
                  <input
                    class="input"
                    id="recentSearch"
                    type="search"
                    placeholder="Pesquisar lançamento..."
                    autocomplete="off"
                  />
                  <span class="field__icon" aria-hidden="true"><i class="bi bi-search"></i></span>
                </div>
              </div>
            </div>
            <section class="card recentCard">
              <div class="recentCard__body" id="recentBody">
                <div class="empty" id="emptyState">Nenhum lançamento cadastrado.</div>
              </div>

              <div class="recentCard__footer" id="recentPager" hidden>
                <div class="pagerInfo" id="recentPagerInfo"></div>
                <div class="pagerBtns">
                  <button class="miniBtn" id="recentPrev" type="button">
                    <i class="bi bi-chevron-left" aria-hidden="true"></i>
                    <span>Anterior</span>
                  </button>
                  <button class="miniBtn" id="recentNext" type="button">
                    <span>Próximo</span>
                    <i class="bi bi-chevron-right" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
            </section>
          </section>
        </section>
      </main>
    </div>

    <div class="modal" id="categoriaModal" hidden>
      <div class="modal__backdrop" id="categoriaBackdrop" aria-hidden="true"></div>
      <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="categoriaTitle">
        <div class="modal__header">
          <div>
            <div class="modal__kicker">CATEGORIAS</div>
            <div class="modal__title" id="categoriaTitle">Adicionar categoria</div>
          </div>
          <button class="iconBtn" type="button" id="categoriaClose" aria-label="Fechar">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </div>

        <form class="modal__body" id="categoriaForm">
          <div id="categoriaError" class="authError" hidden></div>

          <div class="field">
            <label class="field__label" for="categoriaNome">Nome</label>
            <div class="field__control">
              <input class="input" id="categoriaNome" name="name" type="text" placeholder="Ex: Marketing" required />
            </div>
          </div>

          <div class="field" style="margin-top: 14px">
            <label class="field__label" for="categoriaTipo">Tipo</label>
            <div class="field__control">
              <select class="input" id="categoriaTipo" name="type" required>
                <option value="both">Ambos</option>
                <option value="income">Receita</option>
                <option value="expense">Despesa</option>
              </select>
              <span class="field__icon" aria-hidden="true"><i class="bi bi-chevron-down"></i></span>
            </div>
          </div>

          <div class="modal__footer" style="margin-top: 16px">
            <button class="btn btn--soft" type="button" id="categoriaCancel">Cancelar</button>
            <button class="btn btn--primary" type="submit" id="categoriaSubmit">
              <i class="bi bi-plus-circle" aria-hidden="true"></i>
              <span>Criar</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="runtime-config.js"></script>
    <script src="api.js"></script>
    <script src="auth-gate.js"></script>
    <script src="lancamentos.js"></script>
  </body>
</html>
